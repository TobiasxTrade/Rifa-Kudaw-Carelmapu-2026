<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gran Rifa Scout Kudaw Carelmapu 2026</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body {
      background: linear-gradient(135deg, #1e3a2f, #2d5a4a);
      font-family: system-ui, -apple-system, sans-serif;
      margin: 0;
      padding: 0;
    }
    .dome {
      width: 380px;
      height: 380px;
      background: radial-gradient(circle at 50% 35%, #e0f2fe, #67e8f9, #22d3ee, #0891b2);
      border-radius: 50%;
      border: 14px solid #f8fafc;
      box-shadow: 0 0 70px rgba(255,255,255,0.9), inset 0 30px 60px rgba(255,255,255,0.85), 0 30px 60px rgba(0,0,0,0.5);
      position: relative;
      overflow: hidden;
      margin: 0 auto;
    }
    .paper {
      position: absolute;
      width: 32px;
      height: 42px;
      background: linear-gradient(#fff, #f1f5f9);
      border: 1px solid #1e2937;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 13px;
      box-shadow: 3px 3px 6px rgba(0,0,0,0.4);
      border-radius: 4px;
      user-select: none;
    }
  </style>
</head>
<body class="min-h-screen text-white py-10">

  <div class="max-w-4xl mx-auto px-4">
    <div class="text-center mb-10">
      <h1 class="text-5xl font-bold text-yellow-300">Gran Rifa Scout</h1>
      <h2 class="text-4xl font-bold mt-2">Kudaw Carelmapu 2026</h2>
    </div>

    <div class="text-center mb-10">
      <button onclick="mostrarBases()" class="bg-green-700 hover:bg-green-600 px-8 py-4 rounded-full text-lg font-semibold inline-flex items-center gap-3 transition">
        <i class="fa-solid fa-scroll"></i> Ver Bases del Sorteo
      </button>
    </div>

    <div class="bg-white/10 backdrop-blur-md rounded-3xl p-8 mb-12 text-center">
      <h3 class="text-2xl font-semibold mb-6">Cantidad de números en el sorteo</h3>
      <input type="number" id="maxNumber" value="200" min="10" max="10000" 
             class="w-80 text-center text-5xl font-bold bg-white text-gray-900 rounded-2xl py-6 focus:outline-none focus:ring-4 focus:ring-yellow-400">
      <p class="text-green-200 mt-3">Números del 1 al valor ingresado</p>
    </div>

    <div class="flex justify-center">
      <div>
        <div id="dome" class="dome flex items-center justify-center"></div>
        
        <button onclick="iniciarSorteo()" id="startBtn"
                class="mt-10 bg-yellow-400 hover:bg-yellow-300 text-gray-900 font-bold text-2xl px-16 py-6 rounded-full shadow-2xl transition flex items-center gap-4 mx-auto">
          <i class="fa-solid fa-play"></i> COMENZAR SORTEO
        </button>
      </div>
    </div>
  </div>

  <!-- Modal Bases -->
  <div id="modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
    <div class="bg-white text-gray-900 max-w-md w-full mx-4 rounded-3xl p-8">
      <h2 class="text-2xl font-bold mb-5 text-center">Bases del Concurso</h2>
      <p class="text-lg leading-relaxed text-center">
        El sorteo se realizará <strong>SOLO con los números de las rifas vendidas al 23 de mayo del año 2026, a las 16:00</strong>.
      </p>
      <button onclick="cerrarModal()" class="mt-8 w-full bg-green-700 hover:bg-green-600 text-white py-4 rounded-2xl font-semibold text-lg">
        Entendido
      </button>
    </div>
  </div>

  <script>
    let isDrawing = false;

    function mostrarBases() {
      document.getElementById('modal').classList.remove('hidden');
    }

    function cerrarModal() {
      document.getElementById('modal').classList.add('hidden');
    }

    function crearPapelitos(cantidad) {
      const dome = document.getElementById('dome');
      dome.innerHTML = "";

      for (let i = 0; i < cantidad; i++) {
        const papel = document.createElement('div');
        papel.className = 'paper';
        papel.style.left = Math.random() * 65 + 17 + '%';
        papel.style.top = Math.random() * 65 + 17 + '%';
        papel.style.transform = `rotate(${Math.random() * 100 - 50}deg)`;
        papel.textContent = Math.floor(Math.random() * 999) + 1;
        dome.appendChild(papel);

        // Animación tipo remolino/torbellino durante 4 segundos
        animatePaper(papel);
      }
    }

    function animatePaper(papel) {
      let count = 0;
      const totalSteps = 12; // más pasos = movimiento más continuo

      function move() {
        if (count >= totalSteps) return;
        
        count++;
        const angle = Math.random() * 360;
        const radius = 60 + Math.random() * 80;
        const centerX = 50;
        const centerY = 48;

        const x = centerX + Math.cos(angle * Math.PI / 180) * (radius * (Math.random() * 0.6 + 0.7));
        const y = centerY + Math.sin(angle * Math.PI / 180) * (radius * (Math.random() * 0.6 + 0.7));

        const duration = 280 + Math.random() * 220; // movimientos rápidos

        papel.style.transition = `all ${duration}ms cubic-bezier(0.25, 0.1, 0.25, 1)`;
        papel.style.left = `${x}%`;
        papel.style.top = `${y}%`;
        papel.style.transform = `rotate(${Math.random() * 720 - 360}deg)`;

        setTimeout(move, duration - 80);
      }

      move();
    }

    function iniciarSorteo() {
      if (isDrawing) return;

      const max = parseInt(document.getElementById('maxNumber').value) || 200;
      if (max < 10) return alert("Mínimo 10 números");

      isDrawing = true;
      const btn = document.getElementById('startBtn');
      btn.disabled = true;
      btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> Realizando sorteo...`;

      const dome = document.getElementById('dome');
      crearPapelitos(70);   // Más papeles para mejor efecto remolino

      // Animación dura exactamente 4 segundos
      setTimeout(() => {
        const ganador = Math.floor(Math.random() * max) + 1;

        // Solo el número grande (sin texto)
        dome.innerHTML = `
          <div class="text-center">
            <div class="text-[140px] font-black text-red-600 leading-none drop-shadow-2xl">${ganador}</div>
          </div>
        `;

        // Confeti final
        for (let i = 0; i < 35; i++) {
          setTimeout(() => {
            const c = document.createElement('div');
            c.style.position = 'absolute';
            c.style.fontSize = '32px';
            c.style.left = Math.random() * 100 + '%';
            c.textContent = ['🎉','🏕️','🌲','🔥'][Math.floor(Math.random()*4)];
            dome.appendChild(c);
            setTimeout(() => { c.style.top = '360px'; c.style.opacity = '0'; }, 80);
          }, i * 35);
        }

        setTimeout(() => {
          isDrawing = false;
          btn.disabled = false;
          btn.innerHTML = `<i class="fa-solid fa-play"></i> COMENZAR SORTEO`;
        }, 2800);

      }, 4000); // 4 segundos exactos
    }
  </script>
</body>
</html>
